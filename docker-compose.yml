services:
  app:
    image: iamnothardcoded/tastyigniter:latest
    container_name: tastyigniter-app
    ports:
      - "8080:80"
    environment:
      # LAN IP so the site works from phones on the same network (was http://localhost:8080;
      # TI forces all generated URLs to APP_URL). Desktop access via this IP works too.
      - APP_URL=http://192.168.178.32:8080
      - DB_CONNECTION=mysql
      # (see dns: below — embedded DNS forwarding is broken on this compose network)
      - DB_HOST=db
      - DB_DATABASE=tastyigniter
      - DB_USERNAME=tastyigniter
      - DB_PASSWORD=somepassword
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
    volumes:
      - storage:/var/www/html/storage
      - ../app/lang/vendor:/var/www/html/lang/vendor
      - ../app/extensions/jamasa:/var/www/html/extensions/jamasa
      - ../app/themes/famedo:/var/www/html/themes/famedo
      - ../staff-pos:/var/www/html/public/staff-pos
    # Docker's embedded DNS fails to forward external lookups on this project's
    # user-defined network (works on the default bridge) — geocoding needs
    # nominatim.openstreetmap.org. Explicit upstreams fix resolution.
    dns:
      - 1.1.1.1
      - 192.168.178.1
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: mariadb:10.7
    container_name: tastyigniter-db
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_DATABASE=tastyigniter
      - MYSQL_USER=tastyigniter
      - MYSQL_PASSWORD=somepassword
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:6
    container_name: tastyigniter-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped

  print-server:
    build: ../print-server
    container_name: tastyigniter-print-server
    env_file:
      - .env
    environment:
      - API_URL=http://localhost:8080
      - API_TOKEN=${API_TOKEN}
      - POLL_INTERVAL=5000
      # Manual-accept mode: OFF = classic auto-accept on print. ON = the Order
      # Manager app (public/staff-pos/order-manager.html) is the acceptance gate
      # (print on accept). Failsafe auto-accepts a NEU order after N seconds.
      - MANUAL_ACCEPT=${MANUAL_ACCEPT:-false}
      - MANUAL_ACCEPT_FAILSAFE_SECONDS=${MANUAL_ACCEPT_FAILSAFE_SECONDS:-900}
      # Printer-down → auto-close ordering (tunable defaults live in server.js;
      # override any here if needed). Set to false to disable the whole feature.
      - PAUSE_FEATURE_ENABLED=${PAUSE_FEATURE_ENABLED:-true}
      - MAIN_PRINTER_ID=${MAIN_PRINTER_ID:-kitchen}
      # SDP-printer liveness (poll recency; inert for local-mode dev printers).
      # Uncomment/override to tune when the main printer is mode:sdp.
      # - SDP_STALE_SECONDS=${SDP_STALE_SECONDS:-60}
      # - SDP_BOOT_GRACE_SECONDS=${SDP_BOOT_GRACE_SECONDS:-120}
      # Down-alert email (independent SMTP — fill these in .env)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
    volumes:
      - ../print-server/config:/app/config
      - /dev:/dev
    devices:
      - /dev/usb/lp0:/dev/usb/lp0
    privileged: true
    network_mode: host
    depends_on:
      - app
    restart: unless-stopped

volumes:
  storage:
    name: tastyigniter-storage
    driver: local
  db-data:
    name: tastyigniter-db
    driver: local
  redis-data:
    name: tastyigniter-redis
    driver: local
